<!doctype html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="description" content="Acesso seguro ao sistema"><title>Sistema de Logins</title><link rel="icon" href="./favicon.svg" type="image/svg+xml"><link rel="stylesheet" href="./src/style.css"><link rel="stylesheet" href="./src/logo.css"></head>
<body><main class="page"><section class="login-card" aria-label="Login"><div class="brand"><img id="brand-logo" src="./imagens/logo.png" alt="Logomarca do sistema"></div>
<form id="login-form" novalidate><label for="organization">ORGANIZAÇÃO</label><input id="organization" name="organization" type="text" placeholder="ORG_0001" autocomplete="organization" maxlength="24" required><label for="login">LOGIN</label><input id="login" name="login" type="text" placeholder="seu.login" autocomplete="username" maxlength="80" required><label for="password">SENHA</label><input id="password" name="password" type="password" placeholder="Digite sua senha" autocomplete="current-password" maxlength="200" required><label class="show-password" for="show-password"><input id="show-password" type="checkbox"> <span>EXIBIR SENHA</span></label><p id="message" class="message" role="alert" aria-live="polite"></p><button id="submit" type="submit"><span>ENTRAR</span><span class="spinner" aria-hidden="true"></span></button></form>
<div id="success" class="success" hidden><h2>Login realizado com sucesso</h2><p id="welcome"></p><button id="logout" type="button">SAIR</button></div></section></main><script type="module" src="./src/main.js"></script></body></html>
